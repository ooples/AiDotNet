            filter: 'Category!=GPU&Category!=Stress&FullyQualifiedName~AiDotNet.Tests.IntegrationTests.S'
          - name: Integration T-Z
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&(FullyQualifiedName~AiDotNet.Tests.IntegrationTests.T|FullyQualifiedName~AiDotNet.Tests.IntegrationTests.U|FullyQualifiedName~AiDotNet.Tests.IntegrationTests.V|FullyQualifiedName~AiDotNet.Tests.IntegrationTests.W|FullyQualifiedName~AiDotNet.Tests.IntegrationTests.X|FullyQualifiedName~AiDotNet.Tests.IntegrationTests.Y|FullyQualifiedName~AiDotNet.Tests.IntegrationTests.Z)'
          # =====================================================================
          # TOP-LEVEL TEST NAMESPACES that no shard covered (distinct from the
          # UnitTests.* and IntegrationTests.* trees).
          # =====================================================================
          - name: TopLevel - FederatedLearning
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&FullyQualifiedName~AiDotNet.Tests.FederatedLearning'
          - name: TopLevel - Audio/Onnx/Tokenization
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&(FullyQualifiedName~AiDotNet.Tests.Audio|FullyQualifiedName~AiDotNet.Tests.Onnx|FullyQualifiedName~AiDotNet.Tests.Tokenization)'
          - name: TopLevel - Components/Adversarial/EndToEnd
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&(FullyQualifiedName~AiDotNet.Tests.ComponentTests|FullyQualifiedName~AiDotNet.Tests.AdversarialRobustness|FullyQualifiedName~AiDotNet.Tests.EndToEndTests)'
          # =====================================================================
          # SERVING TESTS
          # =====================================================================
          - name: AiDotNet.Serving.Tests
            project: tests/AiDotNet.Serving.Tests/AiDotNet.Serving.Tests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress'

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Free runner disk space
        # ubuntu-latest images ship with Android SDK, .NET preinstalls, Haskell, CodeQL,
        # PowerShell, Boost, and ~14GB of unused tooling. Tests on the largest shards
        # (Diffusion A-C/D-I/J-M/N-R/S-prefix/T-Z, Unit-03 diffusion,
        # Generated Layers A-M/N-Z, ModelFamily-NN) generate
        # enough coverage + dump output to fill the runner volume mid-run, killing the
        # job with `IOException: No space left on device`. Drop the heaviest preinstalls
        # before tests start. ~25-30 GB freed.
        run: |
          # NOTE: do NOT delete /usr/share/dotnet/shared — actions/setup-dotnet
          # below installs the requested SDK alongside the runner-image
          # frameworks, and several reusable composite actions (and our own
          # later steps) expect the preinstalled host frameworks to remain
          # discoverable. We also do NOT delete /usr/local/share/powershell:
          # multiple later steps in this job run with `shell: pwsh`, so
          # removing PowerShell here would break them. Limit cleanup to
          # genuinely unused languages/tools to free disk for the largest
          # test shards without breaking the toolchain we depend on.
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /opt/hostedtoolcache/PyPy || true
          sudo rm -rf /opt/hostedtoolcache/Ruby || true
          sudo rm -rf /opt/hostedtoolcache/go || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /usr/share/miniconda || true
          sudo rm -rf /usr/local/share/boost || true
          sudo apt-get clean
          df -h /

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: build-output-${{ github.sha }}

      - name: Restore dependencies
        run: dotnet restore ${{ matrix.shard.project }}

      - name: Run tests (sharded) with coverage
        # pwsh (PowerShell Core) is pre-installed on ubuntu-latest runners and runs
        # the existing scripts cross-platform without a rewrite.
        shell: pwsh
        run: |
          # Sanitize shard name: remove/replace all characters invalid in file paths
          $shardName = "${{ matrix.shard.name }}"
          $sanitizedShardName = $shardName -replace '[\\/:*?"<>|\s-]+', '_'
          $results = Join-Path "TestResults" $sanitizedShardName
          New-Item -Path $results -ItemType Directory -Force | Out-Null

          # Pre-test resource snapshot. Cancelled-runner shards (Diffusion
          # S-prefix / T-Z, Unit-03 diffusion, ModelFamily-NN,
          # Generated Layers A-M/N-Z)
          # die with `The runner has received a shutdown signal` 2-6 min into
          # test execution. The dotnet test step exits before producing TRX
          # output so we have no idea what was running at OOM time. Dump
          # memory + disk + CPU info on entry so the next cancellation has
          # forensic data.
          Write-Host "=== Pre-test resource snapshot ==="
          Write-Host "Memory:"
          free -h
          Write-Host "Disk:"
          df -h /
          Write-Host "Processors:"
          nproc

          # Per-shard parallelism control. The streaming + Server GC
          # changes earlier in this PR helped most shards stop cancelling,
          # but the heaviest model-family shards (Diffusion letter/prefix shards,
          # Generated Layers A-M/N-Z,
          # Unit-03 diffusion, ModelFamily-NeuralNetworks) still trip OOM
          # with 4 parallel BERT-class
          # model loads in flight on a 16 GB ubuntu-latest runner. Per-iter
          # peak memory ~= 880 MB weights + 1.76 GB Adam state per slot;
          # 4 slots × 2.6 GB + dotnet/xUnit overhead overruns the envelope.
          # For these specific shards we rewrite the built xunit.runner.json
          # to serialize collection execution so heavy models load serially —
          # every other shard stays at the JSON default (= ProcessorCount = 4)
          # and runs full-speed. (See the rewrite block in the run step below;
          # the old `xunit.MaxParallelThreads=1` inline arg was silently
          # ignored by the VSTest adapter.)
          $heavyShards = @(
            'ModelFamily - Diffusion A-C',
            'ModelFamily - Diffusion D-I',
            'ModelFamily - Diffusion J-K',
            'ModelFamily - Diffusion L',
            'ModelFamily - Diffusion M A-Mi',
            'ModelFamily - Diffusion M Mochi-Model',
            'ModelFamily - Diffusion M Motion-MZ',
            'ModelFamily - Diffusion N-R',
            'ModelFamily - Diffusion SA-SD',
            'ModelFamily - Diffusion SE-SP',
            'ModelFamily - Diffusion Stable',
            'ModelFamily - Diffusion Step-Sync',
            'ModelFamily - Diffusion T-Z',
            'ModelFamily - Generated Layers A-F',
            'ModelFamily - Generated Layers G-M',
            'ModelFamily - Generated Layers N-Z',
            'ModelFamily - NeuralNetworks A-F',
            'ModelFamily - NeuralNetworks G-L',
            'ModelFamily - NeuralNetworks M-N',
            'ModelFamily - NeuralNetworks O-R',
            'ModelFamily - NeuralNetworks S',
            'ModelFamily - NeuralNetworks T-Z',
            # TimeSeries/Activation/Loss: the double-precision Transformer/CNN forecasters
            # (Autoformer, Chronos, DeepANT, LSTM-VAE, ...) each fit the 60 s [Fact] budget in
            # isolation (~15 s) but TIME OUT under the shard's default 4-way collection parallelism —
            # their managed-engine forward parallelizes over all cores, so N classes in flight
            # oversubscribe the runner's 4 cores and stall well past 60 s. Serialize so each runs
            # uncontended with the whole machine (the contention is CPU, not paper-scale heaviness, so
            # these stay in the default gate rather than HeavyTimeout). #1706/#1305.
            'ModelFamily - TimeSeries/Activation/Loss',
            'ModelFamily - Code/Forecast/Segment/Survival',
            'Unit - 03a Diffusion Core/Schedulers/Encoding',
            'Unit - 03b1 Diffusion Preprocessors',
            'Unit - 03b2 Diffusion DDPM',
            'Unit - 03b3 Diffusion Control Guidance/Adapters',
            'Unit - 03b4 Diffusion ControlNet Core A',
            'Unit - 03b5 Diffusion ControlNet Core B',
            'Unit - 03c1 Diffusion Contracts A-C',
            'Unit - 03c2 Diffusion Contracts D-I',
            'Unit - 03c3 Diffusion Contracts J-R',
            'Unit - 03c4 Diffusion Contracts S',
            'Unit - 03c5 Diffusion Contracts T-Z',
            'Unit - 03c6 Editing Contracts A-I',
            'Unit - 03c7 Editing Contracts J-Z',
            'Unit - 03d1 Diffusion FastGen Image/VAE',
            'Unit - 03d2 Diffusion FastGen Consistency/Turbo',
            'Unit - 03d3 Diffusion FastGen Flow/AR',
            'Unit - 03d4 Diffusion FastGen Schedulers',
            'Unit - 03d5 Diffusion FastGen SDXL State',
            'Unit - 03d6 Diffusion FastGen Flux State',
            'Unit - 03d7 Diffusion FastGen Distillation',
            'Unit - 03d8 Diffusion New Conditioners',
            # Integration shards that instantiate paper-scale models (Document AI,
            # Finance, ComputerVision, NeuralNetworks, Diffusion, Video, MetaLearning,
            # etc.) — serialize like the ModelFamily shards to stay under the runner
            # memory envelope. The light integration letter-shards run parallel.
            'Integration C - ComputerVision',
            'Integration D',
            'Integration E-G',
            'Integration M',
            'Integration N-O',
            'Integration P-Q',
            'Integration R',
            'Integration S',
            'Integration T-Z',
            'TopLevel - FederatedLearning',
            'TopLevel - Audio/Onnx/Tokenization'
          )
          $serializeShard = $heavyShards -contains $shardName
          $collectCoverage = -not $serializeShard
          Write-Host "Running shard '$shardName' (serialized: $serializeShard; coverage: $collectCoverage)"

          # Build the argument list as a PowerShell array so the `--`
          # separator and the runner args reach `dotnet test` as distinct
          # tokens. Earlier we joined them into one string and pwsh's
          # token splitter parsed `--` as a standalone switch that MSBuild
          # then rejected with `MSB1001: Unknown switch`.
          $dotnetArgs = @(
            'test', '${{ matrix.shard.project }}',
            '-c', 'Release',
            '--framework', '${{ matrix.shard.framework }}',
            '--no-build', '--no-restore',
            # Globally exclude Category=HeavyTimeout from the default sharded run. Those models are
            # CORRECT but inherently too slow for the per-test / 45-min shard budget (foundation
            # diffusion at ~100s/forward x N-step Generate, GEMM-bound ViT/VGG, etc.). They are
            # tracked in the umbrella timeout issue and exercised by the heavy-timeout-nightly
            # workflow with a long budget. Wrapping the per-shard filter here applies the exclusion
            # across all matrix entries in one place; it is a no-op for any test not tagged
            # [Trait("Category","HeavyTimeout")].
            '--filter', '(${{ matrix.shard.filter }})&Category!=HeavyTimeout'
          )
          if ($collectCoverage) {
            $dotnetArgs += @(
              '--collect:XPlat Code Coverage',
              '--settings', 'coverlet.runsettings'
            )
          } else {
            # Coverage collection instruments every loaded assembly and keeps
            # extra per-test state in the VSTest process. On these serialized
            # big-model shards that overhead is the remaining memory multiplier
            # after xUnit parallelism and Server GC were disabled, so run them
            # as correctness-only shards and collect coverage from the lighter
            # matrix entries.
            Write-Host "Heavy shard: XPlat Code Coverage disabled to keep the runner under its memory envelope"
          }
          $dotnetArgs += @(
            '--logger', 'trx;LogFileName=test-results.trx',
            '--logger', 'console;verbosity=normal',
            '--results-directory', $results,
            '--blame-hang-timeout', '5min',
            '--blame-hang-dump-type', 'none'
          )
          # OOM root cause + fix: the heavy shards exhaust the 16 GB runner
          # because xUnit runs many test CLASSES in parallel (default
          # maxParallelThreads = ProcessorCount), and each big-model class
          # holds a multi-GB model + Adam state for the whole class. The
          # `-- xunit.MaxParallelThreads=1` VSTest inline arg we used before
          # is SILENTLY IGNORED by the xunit.runner.visualstudio adapter — only
          # xunit.runner.json in the build output is honored. So for heavy
          # shards we rewrite the copied runner config to serialize collection
          # execution (one model in flight at a time). Every other shard keeps
          # the parallel JSON default and runs full-speed.
          if ($serializeShard) {
            $projDir = Split-Path -Parent '${{ matrix.shard.project }}'
            $runnerJson = Join-Path $projDir 'bin/Release/${{ matrix.shard.framework }}/xunit.runner.json'
            if (Test-Path $runnerJson) {
              $cfg = Get-Content $runnerJson -Raw | ConvertFrom-Json
              $cfg.parallelizeTestCollections = $false
              $cfg.maxParallelThreads = 1
              # Don't materialize every [Theory]'s data rows at discovery time —
              # the assembly discovers ~64k cases and pre-enumeration inflates the
              # retained-case baseline before a single test even runs.
              $cfg | Add-Member -NotePropertyName preEnumerateTheories -NotePropertyValue $false -Force
              $cfg | ConvertTo-Json -Depth 10 | Set-Content $runnerJson -Encoding utf8
              Write-Host "Serialized heavy-shard runner config: $runnerJson"
            } else {
              # These shards are flagged heavy precisely because they OOM without
              # serialization. If the rewrite can't be applied, fail fast rather
              # than fall through to a parallel run that will OOM and waste the runner.
              Write-Host "ERROR: runner config not found at $runnerJson — cannot serialize heavy shard"
              exit 1
            }
            # The global Server GC (DOTNET_gcServer=1) reserves a heap segment per
            # core and collects lazily — high steady-state footprint chosen for
            # throughput under PARALLEL collections. This shard is now serial, so
            # we don't need that throughput; switch it to Workstation GC, which has
            # a much smaller footprint and collects eagerly under memory pressure.
            # (Confirmed necessary: with serialization alone the shard still OOM'd
            # ~70s into serial execution — the footprint, not parallelism, was the
            # remaining cause.)
            $env:DOTNET_gcServer = '0'
            Write-Host "Heavy shard: Workstation GC (DOTNET_gcServer=0) + serial collections"
          }
          & dotnet @dotnetArgs

          # Post-test resource snapshot. If the runner survives this point,
          # the test step finished naturally and the snapshot tells us what
          # the high-water mark looked like.
          $exitCode = $LASTEXITCODE
          Write-Host "=== Post-test resource snapshot ==="
          Write-Host "Memory:"
          free -h
          Write-Host "Disk:"
          df -h /
          exit $exitCode

      - name: Report slow tests
        if: always()
        shell: pwsh
        run: .github/scripts/report-slow-tests.ps1

      - name: Set artifact name
        if: always()
        shell: pwsh
        run: |
          # Create sanitized artifact name from shard name
          $slug = "${{ matrix.shard.name }}" -replace '[\\/:*?"<>|\s-]+', '_'
          echo "ARTIFACT_NAME=coverage-${{ github.sha }}-$slug" >> $env:GITHUB_ENV

      - name: Upload coverage + test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        if: always()
        continue-on-error: true  # Prevent transient GitHub artifact service issues from failing the job
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            TestResults/**/coverage.opencover.xml
            TestResults/**/*.trx
          if-no-files-found: ignore

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event.pull_request.draft != true
    needs:
      - build
      - test-net10-sharded

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache SonarCloud packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
        with:
          path: ${{ runner.temp }}/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -Path ${{ runner.temp }}/scanner -ItemType Directory -Force
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}/scanner

      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          pattern: coverage-${{ github.sha }}-*
          path: TestResults
          merge-multiple: true

      - name: Restore dependencies
        run: dotnet restore

      - name: Begin SonarCloud analysis
        # For very large PRs (e.g., repo-wide formatting), Sonar's "new code" metrics are
        # dominated by line churn and can fail the quality gate (e.g., new coverage) despite
        # no semantic changes. Skip PR-mode analysis in that case.
        if: github.event_name != 'pull_request' || github.event.pull_request.changed_files <= 250
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pass user-controlled values as env vars to prevent script injection
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          PR_BRANCH: ${{ github.head_ref || github.ref_name }}
          PR_BASE: ${{ github.base_ref || inputs.pr_base || 'master' }}
          PR_REPO: ${{ github.repository || inputs.pr_repo || 'ooples/AiDotNet' }}
          EVENT_NAME: ${{ github.event_name }}
        shell: pwsh
        run: |
          $params = @(
            "/k:ooples_AiDotNet",
            "/o:ooples",
            "/d:sonar.token=$env:SONAR_TOKEN",
            "/d:sonar.host.url=https://sonarcloud.io",
            "/d:sonar.cs.opencover.reportsPaths=TestResults/**/coverage.opencover.xml",
            "/d:sonar.exclusions=**/ProgramSynthesis/Models/**,**/ProgramSynthesis/Execution/**,**/ProgramSynthesis/Requests/**,**/ProgramSynthesis/Results/**,**/AiDotNet.Serving/Configuration/**,**/AiDotNet.Serving/Models/**,**/AiDotNet.Serving/Persistence/Migrations/**",
            "/d:sonar.coverage.exclusions=**/tests/**,**/testconsole/**,**/AiDotNetBenchmarkTests/**,**/examples/**,**/Interfaces/**,**/ProgramSynthesis/Interfaces/**,**/ProgramSynthesis/Enums/**,**/ProgramSynthesis/Models/**,**/ProgramSynthesis/Execution/**,**/ProgramSynthesis/Requests/**,**/ProgramSynthesis/Results/**,**/AiDotNet.Serving/**/I*.cs,**/AiDotNet.Serving/Configuration/**,**/AiDotNet.Serving/Models/**,**/AiDotNet.Serving/Persistence/Entities/**,**/AiDotNet.Serving/Persistence/Migrations/**",
            "/d:sonar.cpd.exclusions=**/Interfaces/**,**/ProgramSynthesis/Interfaces/**,**/ProgramSynthesis/Enums/**,**/ProgramSynthesis/Models/**,**/ProgramSynthesis/Execution/**,**/ProgramSynthesis/Requests/**,**/ProgramSynthesis/Results/**,**/AiDotNet.Serving/**/I*.cs,**/AiDotNet.Serving/Configuration/**,**/AiDotNet.Serving/Models/**,**/AiDotNet.Serving/Persistence/Entities/**,**/AiDotNet.Serving/Persistence/Migrations/**",
            "/d:sonar.scm.provider=git"
          )

          # For PR analysis, add incremental analysis parameters (using env vars for safety)
          if (-not [string]::IsNullOrWhiteSpace($env:PR_NUMBER)) {
            $params += "/d:sonar.pullrequest.key=$env:PR_NUMBER"
            $params += "/d:sonar.pullrequest.branch=$env:PR_BRANCH"
            $params += "/d:sonar.pullrequest.base=$env:PR_BASE"
            $params += "/d:sonar.pullrequest.provider=GitHub"
            $params += "/d:sonar.pullrequest.github.repository=$env:PR_REPO"
          }

          & "${{ runner.temp }}/scanner/dotnet-sonarscanner" begin @params

      - name: Build source generator first
        run: dotnet build src/AiDotNet.Generators/AiDotNet.Generators.csproj -c Release --no-restore

      - name: Build (Release)
        # Windows-only MSBuild flags dropped — file-locking workarounds not needed on Linux.
        run: dotnet build -c Release --no-restore

      - name: End SonarCloud analysis
        if: github.event_name != 'pull_request' || github.event.pull_request.changed_files <= 250
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: pwsh
        run: |
          & "${{ runner.temp }}/scanner/dotnet-sonarscanner" end /d:sonar.token="$env:SONAR_TOKEN"

  # Note: net471 tests removed to save CI resources.
  # Build verification for net471 is done in the build job (cross-compiled on Linux
  # via the Microsoft.NETFramework.ReferenceAssemblies NuGet package, which provides
  # the .NET Framework targeting pack on non-Windows runners).
  # Only net10.0 tests are run as they produce coverage for SonarCloud.

  # Artifact size analysis
  size-check:
    name: Artifact Size Check
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore and publish for size analysis
        run: |
          dotnet restore
          dotnet publish src/AiDotNet.csproj -c Release -f net10.0 -o publish

      - name: Analyze artifact size
        id: size
        run: |
          CURRENT_SIZE=$(du -sb publish | cut -f1)
          CURRENT_MB=$(echo "scale=2; $CURRENT_SIZE/1024/1024" | bc)
          echo "current_size=$CURRENT_SIZE" >> $GITHUB_OUTPUT
          echo "current_mb=$CURRENT_MB" >> $GITHUB_OUTPUT
          echo "Publish size: ${CURRENT_MB} MB"

          BASELINE_FILE=".github/artifact-size-baseline.txt"
          if [ -f "$BASELINE_FILE" ]; then
            BASELINE=$(cat "$BASELINE_FILE")
            BASELINE_MB=$(echo "scale=2; $BASELINE/1024/1024" | bc)
            CHANGE=$(echo "scale=2; (($CURRENT_SIZE - $BASELINE) * 100) / $BASELINE" | bc)
            echo "Size change: ${CHANGE}% (baseline ${BASELINE_MB} MB)"
            if (( $(echo "$CHANGE > 10" | bc -l) )); then
              echo "::warning::Artifact size increased by ${CHANGE}% (threshold: 10%)"
            fi
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Publish size: ${{ steps.size.outputs.current_mb }} MB" >> $GITHUB_STEP_SUMMARY

  # NOTE: Website deployment has moved to deploy-website.yml (deploys to Vercel at aidotnet.dev)
