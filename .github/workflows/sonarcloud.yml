name: Build & SonarCloud

# Primary build workflow - other workflows depend on this
# Runs on Windows to support both net10.0 and net471 targets
on:
  push:
    branches:
      - master
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Optional: PR number to run SonarCloud PR analysis (decorates the PR).'
        required: false
      pr_base:
        description: 'Optional: PR base branch name (e.g. master). Used only when pr_number is set.'
        required: false
        default: 'master'
      pr_repo:
        description: 'Optional: GitHub repo for PR decoration (e.g. owner/repo). Used only when pr_number is set.'
        required: false
        default: 'ooples/AiDotNet'
  schedule:
    # Weekly CodeQL scan on Mondays at 8am UTC
    - cron: '0 8 * * 1'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  # CodeQL runs on Ubuntu with net10.0 only - parallel with SonarCloud
  # Runs on PRs, pushes to master/main, and weekly schedule for security analysis
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.pull_request.draft != true
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore src/AiDotNet.csproj

      - name: Initialize CodeQL
        uses: github/codeql-action/init@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        with:
          languages: csharp
          config-file: ./.github/codeql/codeql-config.yml
          queries: security-and-quality

      # CodeQL needs to trace the build - can't reuse artifacts
      # Build only the main library to avoid file lock issues with AiDotNet.Serving's static web assets
      - name: Build for CodeQL (net10.0)
        run: dotnet build src/AiDotNet.csproj -c Release --no-restore -f net10.0

      - name: Perform CodeQL Analysis (no SARIF upload for huge PRs)
        if: github.event_name == 'pull_request' && github.event.pull_request.changed_files > 250
        uses: github/codeql-action/analyze@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        with:
          category: "/language:csharp"
          upload: never

      - name: Perform CodeQL Analysis
        if: github.event_name != 'pull_request' || github.event.pull_request.changed_files <= 250
        uses: github/codeql-action/analyze@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        with:
          category: "/language:csharp"
          upload: always

  # Build once on Windows (net10.0 + net471), then run tests in parallel shards.
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    if: github.event.pull_request.draft != true

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build source generator first
        run: dotnet build src/AiDotNet.Generators/AiDotNet.Generators.csproj -c Release --no-restore

      - name: Shutdown build servers to release file handles
        run: dotnet build-server shutdown

      - name: Build (Release)
        run: dotnet build -c Release --no-restore -p:UseSharedCompilation=false -p:nodeReuse=false

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: build-output-${{ github.sha }}
          path: |
            **/bin/Release/
            **/obj/Release/
          retention-days: 1

      - name: Build NuGet package
        run: dotnet pack --no-build -c Release --output ./artifacts

      - name: Upload NuGet package
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg

  # Sharded test execution for fast, parallel feedback and coverage generation (net10.0).
  # Coverage artifacts are consumed by the SonarCloud analysis job below.
  test-net10-sharded:
    name: Tests (net10.0) - ${{ matrix.shard.name }}
    runs-on: windows-latest
    needs: build-windows
    timeout-minutes: 45
    if: github.event.pull_request.draft != true
    strategy:
      fail-fast: false
      matrix:
        shard:
          # =====================================================================
          # UNIT TESTS — manually written tests in tests/AiDotNet.Tests/UnitTests/
          # =====================================================================
          - name: Unit - 01 Activation/Attention/Autodiff
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&(FullyQualifiedName~UnitTests.ActivationFunctions|FullyQualifiedName~UnitTests.Attention|FullyQualifiedName~UnitTests.Autodiff)'
          - name: Unit - 02 AutoML/Data/Diagnostics
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&(FullyQualifiedName~UnitTests.AutoML|FullyQualifiedName~UnitTests.Data|FullyQualifiedName~UnitTests.Diagnostics)'
          - name: Unit - 03 Diffusion/Encoding
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&(FullyQualifiedName~UnitTests.Diffusion|FullyQualifiedName~UnitTests.Encoding)'
          - name: Unit - 04 Feature/Fit/Fitness/Genetics
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&(FullyQualifiedName~UnitTests.FeatureSelectors|FullyQualifiedName~UnitTests.FitDetectors|FullyQualifiedName~UnitTests.FitnessCalculators|FullyQualifiedName~UnitTests.Genetics)'
          - name: Unit - 05 Helpers/Inference/Interpretability
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&(FullyQualifiedName~UnitTests.Helpers|FullyQualifiedName~UnitTests.Inference|FullyQualifiedName~UnitTests.Interpretability)'
          - name: Unit - 06 JIT/KD/Schedulers/LA
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&(FullyQualifiedName~UnitTests.JitCompiler|FullyQualifiedName~UnitTests.KnowledgeDistillation|FullyQualifiedName~UnitTests.LearningRateSchedulers|FullyQualifiedName~UnitTests.LinearAlgebra)'
          - name: Unit - 07 Logging/Loss/Meta/Mixed/Compression
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&(FullyQualifiedName~UnitTests.Logging|FullyQualifiedName~UnitTests.LossFunctions|FullyQualifiedName~UnitTests.MetaLearning|FullyQualifiedName~UnitTests.MixedPrecision|FullyQualifiedName~UnitTests.ModelCompression)'
          # NeuralNetworks split to avoid timeouts
          - name: Unit - 08a NN-Classic (ResNet/VGG/DenseNet)
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&(FullyQualifiedName~ResNetNetworkTests|FullyQualifiedName~VGGNetworkTests|FullyQualifiedName~DenseNetTests)'
          - name: Unit - 08b NN-Efficient (MobileNet/EfficientNet)
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&(FullyQualifiedName~MobileNetTests|FullyQualifiedName~EfficientNetTests)'
          - name: Unit - 08c NN-VLM (Blip/Blip2/Clip)
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&(FullyQualifiedName~BlipNeuralNetworkTests|FullyQualifiedName~Blip2NeuralNetworkTests|FullyQualifiedName~ClipNeuralNetworkTests)'
          - name: Unit - 08d NN-Adapters/Other
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&(FullyQualifiedName~LoRAAdapterTests|FullyQualifiedName~LoRALayerTests|FullyQualifiedName~VBLoRAAdapterTests|FullyQualifiedName~AdvancedAlgebraNetworkTests|FullyQualifiedName~MixtureOfExpertsNeuralNetworkTests)'
          - name: Unit - 09 Optimizers/RAG
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&(FullyQualifiedName~UnitTests.Optimizers|FullyQualifiedName~UnitTests.RAG)'
          - name: Unit - 10 Regularization/RL/RAG2
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&(FullyQualifiedName~UnitTests.Regularization|FullyQualifiedName~UnitTests.ReinforcementLearning|FullyQualifiedName~UnitTests.RetrievalAugmentedGeneration)'
          - name: Unit - 11 Serving/TimeSeries/Token/Transfer
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&(FullyQualifiedName~UnitTests.Serving|FullyQualifiedName~UnitTests.TimeSeries|FullyQualifiedName~UnitTests.Tokenization|FullyQualifiedName~UnitTests.TransferLearning)'
          - name: Unit - 12 ProgramSynthesis/Reasoning
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&(FullyQualifiedName~UnitTests.ProgramSynthesis|FullyQualifiedName~UnitTests.Reasoning)'
          - name: Unit - 13 Remaining (ActiveLearning/Agents/CL/Physics/etc.)
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: >-
              Category!=GPU&Category!=Stress&
              FullyQualifiedName~AiDotNet.Tests.UnitTests&
              FullyQualifiedName!~UnitTests.ActivationFunctions&
              FullyQualifiedName!~UnitTests.Attention&
              FullyQualifiedName!~UnitTests.Autodiff&
              FullyQualifiedName!~UnitTests.AutoML&
              FullyQualifiedName!~UnitTests.Data&
              FullyQualifiedName!~UnitTests.Diagnostics&
              FullyQualifiedName!~UnitTests.Diffusion&
              FullyQualifiedName!~UnitTests.Encoding&
              FullyQualifiedName!~UnitTests.FeatureSelectors&
              FullyQualifiedName!~UnitTests.FitDetectors&
              FullyQualifiedName!~UnitTests.FitnessCalculators&
              FullyQualifiedName!~UnitTests.Genetics&
              FullyQualifiedName!~UnitTests.Helpers&
              FullyQualifiedName!~UnitTests.Inference&
              FullyQualifiedName!~UnitTests.Interpretability&
              FullyQualifiedName!~UnitTests.JitCompiler&
              FullyQualifiedName!~UnitTests.KnowledgeDistillation&
              FullyQualifiedName!~UnitTests.LearningRateSchedulers&
              FullyQualifiedName!~UnitTests.LinearAlgebra&
              FullyQualifiedName!~UnitTests.Logging&
              FullyQualifiedName!~UnitTests.LossFunctions&
              FullyQualifiedName!~UnitTests.MetaLearning&
              FullyQualifiedName!~UnitTests.MixedPrecision&
              FullyQualifiedName!~UnitTests.ModelCompression&
              FullyQualifiedName!~UnitTests.NeuralNetworks&
              FullyQualifiedName!~UnitTests.Optimizers&
              FullyQualifiedName!~UnitTests.RAG&
              FullyQualifiedName!~UnitTests.Regularization&
              FullyQualifiedName!~UnitTests.ReinforcementLearning&
              FullyQualifiedName!~UnitTests.RetrievalAugmentedGeneration&
              FullyQualifiedName!~UnitTests.Serving&
              FullyQualifiedName!~UnitTests.TimeSeries&
              FullyQualifiedName!~UnitTests.Tokenization&
              FullyQualifiedName!~UnitTests.TransferLearning&
              FullyQualifiedName!~UnitTests.ProgramSynthesis&
              FullyQualifiedName!~UnitTests.Reasoning
          # =====================================================================
          # OTHER NON-UNIT TESTS (InferenceOpt, PromptEng, Recovery, Playground)
          # =====================================================================
          - name: Other - InferenceOptimization
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&FullyQualifiedName~AiDotNet.Tests.InferenceOptimization'
          - name: Other - PromptEngineering
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&FullyQualifiedName~AiDotNet.Tests.PromptEngineering'
          - name: Other - Recovery/Concurrency
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress&(FullyQualifiedName~AiDotNet.Tests.Recovery|FullyQualifiedName~AiDotNet.Tests.Concurrency)'
          - name: Other - Playground
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: Category=Playground
          # =====================================================================
          # MODEL FAMILY TESTS — invariant math tests for all model families
          # =====================================================================
          - name: ModelFamily - Classification
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'FullyQualifiedName~ModelFamilyTests.Classification'
          - name: ModelFamily - Clustering/GP
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: '(FullyQualifiedName~ModelFamilyTests.Clustering|FullyQualifiedName~ModelFamilyTests.GaussianProcess)'
          - name: ModelFamily - Regression
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'FullyQualifiedName~ModelFamilyTests.Regression'
          - name: ModelFamily - NeuralNetworks
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'FullyQualifiedName~ModelFamilyTests.NeuralNetworks'
          - name: ModelFamily - TimeSeries/Activation/Loss
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: '(FullyQualifiedName~ModelFamilyTests.TimeSeries|FullyQualifiedName~ModelFamilyTests.ActivationFunctions|FullyQualifiedName~ModelFamilyTests.LossFunctions)'
          # Diffusion split into 3 shards (~80 files each) due to large count (244 files)
          - name: ModelFamily - Diffusion A-I
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: >-
              FullyQualifiedName~ModelFamilyTests.Diffusion&
              (FullyQualifiedName~Tests.A|FullyQualifiedName~Tests.B|FullyQualifiedName~Tests.C|FullyQualifiedName~Tests.D|FullyQualifiedName~Tests.E|FullyQualifiedName~Tests.F|FullyQualifiedName~Tests.G|FullyQualifiedName~Tests.H|FullyQualifiedName~Tests.I)
          - name: ModelFamily - Diffusion J-R
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: >-
              FullyQualifiedName~ModelFamilyTests.Diffusion&
              (FullyQualifiedName~Tests.J|FullyQualifiedName~Tests.K|FullyQualifiedName~Tests.L|FullyQualifiedName~Tests.M|FullyQualifiedName~Tests.N|FullyQualifiedName~Tests.O|FullyQualifiedName~Tests.P|FullyQualifiedName~Tests.Q|FullyQualifiedName~Tests.R)
          - name: ModelFamily - Diffusion S-Z
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: >-
              FullyQualifiedName~ModelFamilyTests.Diffusion&
              (FullyQualifiedName~Tests.S|FullyQualifiedName~Tests.T|FullyQualifiedName~Tests.U|FullyQualifiedName~Tests.V|FullyQualifiedName~Tests.W|FullyQualifiedName~Tests.X|FullyQualifiedName~Tests.Y|FullyQualifiedName~Tests.Z)
          # Auto-generated layer tests from TestScaffoldGenerator (~1670 methods)
          - name: ModelFamily - Generated Layers
            project: tests/AiDotNet.Tests/AiDotNetTests.csproj
            framework: net10.0
            filter: 'FullyQualifiedName~ModelFamilyTests.Generated'
          # =====================================================================
          # SERVING TESTS
          # =====================================================================
          - name: AiDotNet.Serving.Tests
            project: tests/AiDotNet.Serving.Tests/AiDotNet.Serving.Tests.csproj
            framework: net10.0
            filter: 'Category!=GPU&Category!=Stress'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: build-output-${{ github.sha }}

      - name: Restore dependencies
        run: dotnet restore ${{ matrix.shard.project }}

      - name: Run tests (sharded) with coverage
        shell: powershell
        run: |
          # Sanitize shard name: remove/replace all characters invalid in file paths
          $shardName = "${{ matrix.shard.name }}"
          $sanitizedShardName = $shardName -replace '[\\/:*?"<>|\s-]+', '_'
          $results = Join-Path "TestResults" $sanitizedShardName
          New-Item -Path $results -ItemType Directory -Force | Out-Null
          dotnet test ${{ matrix.shard.project }} -c Release --framework ${{ matrix.shard.framework }} --no-restore --filter "${{ matrix.shard.filter }}" --collect:"XPlat Code Coverage" --settings coverlet.runsettings --logger "trx;LogFileName=test-results.trx" --logger "console;verbosity=normal" --results-directory $results

      - name: Report slow tests
        if: always()
        shell: powershell
        run: .github/scripts/report-slow-tests.ps1

      - name: Set artifact name
        if: always()
        shell: powershell
        run: |
          # Create sanitized artifact name from shard name
          $slug = "${{ matrix.shard.name }}" -replace '[\\/:*?"<>|\s-]+', '_'
          echo "ARTIFACT_NAME=coverage-${{ github.sha }}-$slug" >> $env:GITHUB_ENV

      - name: Upload coverage + test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        if: always()
        continue-on-error: true  # Prevent transient GitHub artifact service issues from failing the job
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            TestResults/**/coverage.opencover.xml
            TestResults/**/*.trx
          if-no-files-found: ignore

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: windows-latest
    timeout-minutes: 45
    if: github.event.pull_request.draft != true
    needs:
      - build-windows
      - test-net10-sharded

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache SonarCloud packages
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory -Force
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner

      - name: Download coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          pattern: coverage-${{ github.sha }}-*
          path: TestResults
          merge-multiple: true

      - name: Restore dependencies
        run: dotnet restore

      - name: Begin SonarCloud analysis
        # For very large PRs (e.g., repo-wide formatting), Sonar's "new code" metrics are
        # dominated by line churn and can fail the quality gate (e.g., new coverage) despite
        # no semantic changes. Skip PR-mode analysis in that case.
        if: github.event_name != 'pull_request' || github.event.pull_request.changed_files <= 250
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pass user-controlled values as env vars to prevent script injection
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          PR_BRANCH: ${{ github.head_ref || github.ref_name }}
          PR_BASE: ${{ github.base_ref || inputs.pr_base || 'master' }}
          PR_REPO: ${{ github.repository || inputs.pr_repo || 'ooples/AiDotNet' }}
          EVENT_NAME: ${{ github.event_name }}
        shell: powershell
        run: |
          $params = @(
            "/k:ooples_AiDotNet",
            "/o:ooples",
            "/d:sonar.token=$env:SONAR_TOKEN",
            "/d:sonar.host.url=https://sonarcloud.io",
            "/d:sonar.cs.opencover.reportsPaths=TestResults/**/coverage.opencover.xml",
            "/d:sonar.exclusions=**/ProgramSynthesis/Models/**,**/ProgramSynthesis/Execution/**,**/ProgramSynthesis/Requests/**,**/ProgramSynthesis/Results/**,**/AiDotNet.Serving/Configuration/**,**/AiDotNet.Serving/Models/**,**/AiDotNet.Serving/Persistence/Migrations/**",
            "/d:sonar.coverage.exclusions=**/tests/**,**/testconsole/**,**/AiDotNetBenchmarkTests/**,**/examples/**,**/Interfaces/**,**/ProgramSynthesis/Interfaces/**,**/ProgramSynthesis/Enums/**,**/ProgramSynthesis/Models/**,**/ProgramSynthesis/Execution/**,**/ProgramSynthesis/Requests/**,**/ProgramSynthesis/Results/**,**/AiDotNet.Serving/**/I*.cs,**/AiDotNet.Serving/Configuration/**,**/AiDotNet.Serving/Models/**,**/AiDotNet.Serving/Persistence/Entities/**,**/AiDotNet.Serving/Persistence/Migrations/**",
            "/d:sonar.cpd.exclusions=**/Interfaces/**,**/ProgramSynthesis/Interfaces/**,**/ProgramSynthesis/Enums/**,**/ProgramSynthesis/Models/**,**/ProgramSynthesis/Execution/**,**/ProgramSynthesis/Requests/**,**/ProgramSynthesis/Results/**,**/AiDotNet.Serving/**/I*.cs,**/AiDotNet.Serving/Configuration/**,**/AiDotNet.Serving/Models/**,**/AiDotNet.Serving/Persistence/Entities/**,**/AiDotNet.Serving/Persistence/Migrations/**",
            "/d:sonar.scm.provider=git"
          )

          # For PR analysis, add incremental analysis parameters (using env vars for safety)
          if (-not [string]::IsNullOrWhiteSpace($env:PR_NUMBER)) {
            $params += "/d:sonar.pullrequest.key=$env:PR_NUMBER"
            $params += "/d:sonar.pullrequest.branch=$env:PR_BRANCH"
            $params += "/d:sonar.pullrequest.base=$env:PR_BASE"
            $params += "/d:sonar.pullrequest.provider=GitHub"
            $params += "/d:sonar.pullrequest.github.repository=$env:PR_REPO"
          }

          & "${{ runner.temp }}\scanner\dotnet-sonarscanner" begin @params

      - name: Build source generator first
        run: dotnet build src/AiDotNet.Generators/AiDotNet.Generators.csproj -c Release --no-restore

      - name: Shutdown build servers to release file handles
        run: dotnet build-server shutdown

      - name: Build (Release)
        run: dotnet build -c Release --no-restore -p:UseSharedCompilation=false -p:nodeReuse=false

      - name: End SonarCloud analysis
        if: github.event_name != 'pull_request' || github.event.pull_request.changed_files <= 250
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          ${{ runner.temp }}\scanner\dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"

  # Note: net471 tests removed to save CI resources
  # Build verification for net471 is done in the build-windows job
  # Only net10.0 tests are run as they produce coverage for SonarCloud

  # Artifact size analysis
  size-check:
    name: Artifact Size Check
    runs-on: ubuntu-latest
    needs: build-windows
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore and publish for size analysis
        run: |
          dotnet restore
          dotnet publish src/AiDotNet.csproj -c Release -f net10.0 -o publish

      - name: Analyze artifact size
        id: size
        run: |
          CURRENT_SIZE=$(du -sb publish | cut -f1)
          CURRENT_MB=$(echo "scale=2; $CURRENT_SIZE/1024/1024" | bc)
          echo "current_size=$CURRENT_SIZE" >> $GITHUB_OUTPUT
          echo "current_mb=$CURRENT_MB" >> $GITHUB_OUTPUT
          echo "Publish size: ${CURRENT_MB} MB"

          BASELINE_FILE=".github/artifact-size-baseline.txt"
          if [ -f "$BASELINE_FILE" ]; then
            BASELINE=$(cat "$BASELINE_FILE")
            BASELINE_MB=$(echo "scale=2; $BASELINE/1024/1024" | bc)
            CHANGE=$(echo "scale=2; (($CURRENT_SIZE - $BASELINE) * 100) / $BASELINE" | bc)
            echo "Size change: ${CHANGE}% (baseline ${BASELINE_MB} MB)"
            if (( $(echo "$CHANGE > 10" | bc -l) )); then
              echo "::warning::Artifact size increased by ${CHANGE}% (threshold: 10%)"
            fi
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Publish size: ${{ steps.size.outputs.current_mb }} MB" >> $GITHUB_STEP_SUMMARY

  # NOTE: Website deployment has moved to deploy-website.yml (deploys to Vercel at aidotnet.dev)
