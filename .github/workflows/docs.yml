name: Marketing Website (Manual Rebuild)

# Manual-only rebuild of the marketing website to GitHub Pages.
# Use this when you need to force a rebuild without pushing to master.
# The primary automatic deployment runs via deploy-website.yml on pushes to master.
on:
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build & Deploy Marketing Website
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./website/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Deployment summary
        if: always()
        run: |
          echo "## Marketing Website Deployment (Manual)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.deployment.outcome }}" == "success" ]; then
            echo "Website deployed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "Deployment completed with warnings" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Links" >> $GITHUB_STEP_SUMMARY
          echo "- [Home](https://ooples.github.io/AiDotNet/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Features](https://ooples.github.io/AiDotNet/features/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Pricing](https://ooples.github.io/AiDotNet/pricing/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Playground](https://ooples.github.io/AiDotNet/playground/)" >> $GITHUB_STEP_SUMMARY
