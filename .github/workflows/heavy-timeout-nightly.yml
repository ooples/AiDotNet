name: Heavy Timeout Models (nightly)

# Best-effort tracking lane for models tagged [Trait("Category","HeavyTimeout")].
#
# These models are CORRECT but inherently too slow for the per-test / 45-min budget of the
# default sharded test workflow (Build & SonarCloud), so they are EXCLUDED there via
# `&Category!=HeavyTimeout` and the default PR gate stays green. This workflow runs them
# separately with a long job budget so we keep visibility on them and notice if one regresses
# or — as the perf work lands — becomes fast enough to graduate back into the default shards
# (drop the trait, restore a normal [Fact(Timeout)]).
#
# It is INFORMATIONAL, not a merge gate: it is not a required check and never blocks a PR.
# Individual tests may still hit their own [Fact(Timeout=...)] — that is expected for the
# heaviest models and is exactly what the umbrella tracking issue records. The point is the
# dashboard, not a pass/fail gate.

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC nightly
  workflow_dispatch: {}

# Don't fight the PR test workflow's concurrency group; this is its own long-running lane.
concurrency:
  group: heavy-timeout-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  heavy-timeout:
    name: Heavy Timeout Models
    runs-on: ubuntu-latest
    timeout-minutes: 350   # generous budget; these models are the slow ones by definition
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore tests/AiDotNet.Tests/AiDotNetTests.csproj

      - name: Build (Release, net10.0)
        run: dotnet build tests/AiDotNet.Tests/AiDotNetTests.csproj -c Release --framework net10.0 --no-restore

      - name: Run heavy-timeout models (best-effort, non-gating)
        # Only the tagged models. Keep xUnit serial so the heaviest models don't stack memory.
        run: >-
          dotnet test tests/AiDotNet.Tests/AiDotNetTests.csproj
          -c Release --framework net10.0 --no-build --no-restore
          --filter 'Category=HeavyTimeout'
          --logger 'trx;LogFileName=heavy-timeout.trx'
          --logger 'console;verbosity=normal'
          --results-directory artifacts/heavy-timeout
        continue-on-error: true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heavy-timeout-results
          path: artifacts/heavy-timeout
          if-no-files-found: ignore
