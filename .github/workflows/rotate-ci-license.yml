name: Rotate CI license token

# Re-signs the scope-fenced ci-2026a aidn2 token before it expires and updates the AIDOTNET_CI_LICENSE_KEY
# secret, so CI's real-key path (sonarcloud.yml / heavy-timeout-nightly.yml) never breaks on a stale token.
# Signs with the CI-ONLY private key (AIDOTNET_CI_LICENSE_SIGNING_KEY_PKCS8) — the embedded PUBLIC key is
# unchanged, so nothing else needs rebuilding. See docs/licensing/v2-deploy-runbook.md step 6.
#
# Setup notes:
#   - AIDOTNET_CI_LICENSE_SIGNING_KEY_PKCS8 (secret): base64 DER PKCS#8 of the ci-2026a Ed25519 private key.
#   - CI_LICENSE_ROTATION_PAT (secret): a PAT / fine-grained token with `secrets: write` on this repo —
#     GITHUB_TOKEN cannot update repository secrets, so a dedicated token is required.

on:
  schedule:
    # Monthly, well inside the token's ~1y validity, so a rotation has many retries before expiry.
    - cron: "0 3 1 * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Token validity in days"
        required: false
        default: "365"
      kid:
        description: "Signing key id (must match the embedded public key)"
        required: false
        default: "ci-2026a"

permissions:
  contents: read

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cryptography
        run: pip install --quiet cryptography

      - name: Re-mint the scope:ci aidn2 token
        id: mint
        env:
          PKCS8_B64: ${{ secrets.AIDOTNET_CI_LICENSE_SIGNING_KEY_PKCS8 }}
          KID: ${{ github.event.inputs.kid || 'ci-2026a' }}
          DAYS: ${{ github.event.inputs.days || '365' }}
        run: |
          if [ -z "$PKCS8_B64" ]; then
            echo "::error::AIDOTNET_CI_LICENSE_SIGNING_KEY_PKCS8 is not set — cannot rotate."
            exit 1
          fi
          python - <<'PY' > token.txt
          import base64, json, os, datetime as dt
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey  # noqa: F401
          from cryptography.hazmat.primitives import serialization
          def b64url(b): return base64.urlsafe_b64encode(b).rstrip(b"=").decode()
          priv = serialization.load_der_private_key(base64.b64decode(os.environ["PKCS8_B64"]), password=None)
          now = dt.datetime.now(dt.timezone.utc)
          exp = now + dt.timedelta(days=int(os.environ["DAYS"]))
          kid = os.environ["KID"]
          claims = {
              "sub": "aidotnet-ci", "tier": "enterprise", "seats": 1,
              "iat": int(now.timestamp()), "exp": int(exp.timestamp()),
              "kid": kid, "alg": "EdDSA", "jti": f"{kid}-token",
              "caps": ["model:save", "model:load", "tensors:save", "tensors:load", "model:encrypt"],
              "scope": "ci",
          }
          cb = json.dumps(claims, separators=(",", ":")).encode()
          sig = priv.sign(cb)
          # Self-verify before emitting.
          priv.public_key().verify(sig, cb)
          print("aidn2." + b64url(cb) + "." + b64url(sig), end="")
          PY
          echo "Minted a fresh scope:ci token ($(wc -c < token.txt) chars), exp in ${DAYS}d."

      - name: Update the AIDOTNET_CI_LICENSE_KEY secret
        env:
          GH_TOKEN: ${{ secrets.CI_LICENSE_ROTATION_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::CI_LICENSE_ROTATION_PAT (a PAT with 'secrets: write') is not set — cannot update the secret."
            exit 1
          fi
          gh secret set AIDOTNET_CI_LICENSE_KEY --repo "${{ github.repository }}" --body "$(cat token.txt)"
          rm -f token.txt
          echo "Rotated AIDOTNET_CI_LICENSE_KEY."
