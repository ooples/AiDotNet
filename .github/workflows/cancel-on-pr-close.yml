name: Cancel in-progress runs on PR close

# When a PR is merged or closed, cancel any in-progress workflow runs that
# were targeting the PR's HEAD ref. Without this, the last `synchronize`
# event's Build & SonarCloud run keeps executing for ~45min on a SHA that
# is now dead (PR branch typically auto-deletes on merge), wasting a CI
# slot that PR runs on other branches would otherwise use.
#
# Triggered on:
#   - pull_request.closed (merged OR closed-without-merge — both leave the
#     run orphaned)
#
# Permissions: actions:write is the minimum needed for `gh run cancel`.

on:
  pull_request:
    types: [closed]

permissions:
  actions: write

jobs:
  # ── Server-side eviction (the runner-proof path) ──────────────────────────
  # GitHub evaluates a job's `concurrency` group AT QUEUE TIME, the moment the
  # run is created — BEFORE any runner is assigned. Entering a heavy workflow's
  # group with cancel-in-progress: true therefore cancels its in-flight run
  # immediately and server-side, even while this job itself sits queued.
  #
  # This is the fix for the saturation deadlock: the API-sweep job below needs
  # a runner, and when the pool is saturated by the very runs it must cancel,
  # it queues BEHIND them and fires ~45 minutes too late. The eviction jobs'
  # side effect needs no runner at all; their bodies are no-ops.
  #
  # Group keys must mirror the heavy workflows' own `concurrency.group`
  # expressions exactly, evaluated in this (pull_request: closed) context:
  #   - sonarcloud.yml:  build-${{ github.event.pull_request.number || github.ref }}
  #   - ci-website.yml:  ci-website-${{ github.head_ref }}
  #   - codacy.yml:      codacy-${{ github.ref }}  (refs/pull/N/merge on PR events)
  evict-build-group:
    name: Evict Build & SonarCloud concurrency group
    runs-on: ubuntu-latest
    timeout-minutes: 2
    concurrency:
      group: build-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - run: echo "Evicted concurrency group build-${{ github.event.pull_request.number }} (cancellation happened server-side at queue time)."

  evict-ci-website-group:
    name: Evict ci-website concurrency group
    runs-on: ubuntu-latest
    timeout-minutes: 2
    concurrency:
      group: ci-website-${{ github.event.pull_request.head.ref }}
      cancel-in-progress: true
    steps:
      - run: echo "Evicted concurrency group ci-website-${{ github.event.pull_request.head.ref }}."

  evict-codacy-group:
    name: Evict codacy concurrency group
    runs-on: ubuntu-latest
    timeout-minutes: 2
    concurrency:
      group: codacy-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - run: echo "Evicted concurrency group codacy-${{ github.ref }}."

  # ── API sweep (defense-in-depth) ──────────────────────────────────────────
  # Catches workflows whose group keys can't be reproduced here (group strings
  # embedding ${{ github.workflow }} evaluate to THIS workflow's name in this
  # context) plus queued-but-not-started runs. May fire late under saturation —
  # the eviction jobs above already killed the long runs by then.
  cancel:
    name: Cancel orphaned PR runs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Cancel in-progress workflow runs for this PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Find in-progress AND queued runs that match this PR's head ref or
          # head SHA. We check both because:
          #   - `pull_request` event runs are keyed by PR number but list their
          #     head ref as the PR branch name.
          #   - A run can be queued (not yet started) and still consume a FIFO
          #     slot — kill those too.
          #
          # `gh api` returns runs across ALL workflows in the repo; filter by
          # branch match. The PR's head ref + head SHA together uniquely
          # identify any run that was triggered for this PR's last sync push.
          for status in in_progress queued; do
            echo "::group::Looking for $status runs on $PR_HEAD_REF"
            gh api "repos/${{ github.repository }}/actions/runs?branch=${PR_HEAD_REF}&status=${status}&per_page=100" \
              --jq '.workflow_runs[] | "\(.id) \(.head_sha) \(.name)"' \
              | while read run_id head_sha run_name; do
                  # Defense in depth: only cancel if the run is for this PR's
                  # head SHA. Avoids false-positives if the same branch name
                  # gets reused for a different PR later.
                  if [ "$head_sha" = "$PR_HEAD_SHA" ]; then
                    echo "Cancelling run $run_id ($run_name) for PR #$PR_NUMBER head $head_sha"
                    gh run cancel "$run_id" --repo "${{ github.repository }}" || true
                  fi
                done
            echo "::endgroup::"
          done
