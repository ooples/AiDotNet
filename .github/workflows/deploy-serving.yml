name: Deploy AiDotNet Serving API

on:
  push:
    branches: [master]
    paths: ['src/AiDotNet.Serving/**', 'src/AiDotNet/**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: serving-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          dotnet publish src/AiDotNet.Serving/AiDotNet.Serving.csproj \
            -c Release \
            -o ./publish \
            -r linux-x64 \
            --self-contained false \
            -p:DebugType=none \
            -p:DebugSymbols=false

      - name: Remove unnecessary localization resources
        run: |
          cd publish
          rm -rf cs de es fr it ja ko pl pt-BR ru tr zh-Hans zh-Hant

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3
        with:
          app-name: aidotnet-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
