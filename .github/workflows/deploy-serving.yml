name: Deploy AiDotNet Serving API

on:
  push:
    branches: [master]
    paths: ['src/AiDotNet.Serving/**', 'src/AiDotNet/**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: serving-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          dotnet publish src/AiDotNet.Serving/AiDotNet.Serving.csproj \
            -c Release \
            -o ./publish \
            -r linux-x64 \
            --self-contained false \
            -p:DebugType=none \
            -p:DebugSymbols=false

      - name: Remove unnecessary localization resources
        run: |
          cd publish
          rm -rf cs de es fr it ja ko pl pt-BR ru tr zh-Hans zh-Hant

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@84a80cfe7e9889f35148ed88c307e6e93bf02578 # v3
        with:
          app-name: aidotnet-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
