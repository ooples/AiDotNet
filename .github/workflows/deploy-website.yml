name: Deploy Marketing Website

on:
  push:
    branches: [master]
    paths: ['website/**', 'website/supabase/migrations/**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.20.12

      - name: Link Supabase project
        run: supabase link --project-ref yfkqwpgjahoamlgckjib
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply Supabase migrations
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Build website
        run: npx astro build
        env:
          VERCEL: '1'

      - name: Install Vercel CLI
        run: npm i -g vercel@50.4.8

      - name: Prepare and deploy to Vercel Production
        working-directory: /tmp
        run: |
          mkdir -p vercel-deploy/website/dist
          cp -r $GITHUB_WORKSPACE/website/dist/* vercel-deploy/website/dist/
          cat > vercel-deploy/website/package.json << 'PKGJSON'
          {"scripts":{"build":"echo already built"}}
          PKGJSON
          cd vercel-deploy
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deployment summary
        if: success()
        run: |
          echo "## Marketing Website Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployed to Vercel Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Links" >> $GITHUB_STEP_SUMMARY
          echo "- [Home](https://aidotnet.dev/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Features](https://aidotnet.dev/features/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Pricing](https://aidotnet.dev/pricing/)" >> $GITHUB_STEP_SUMMARY
