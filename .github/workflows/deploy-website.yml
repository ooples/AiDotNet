name: Deploy Marketing Website

on:
  push:
    branches: [master]
    paths: ['website/**', '.github/workflows/deploy-website.yml']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-deploy
  cancel-in-progress: true

jobs:
  migrate-database:
    name: Apply Supabase Migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Supabase CLI
        uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1
        with:
          version: 2.84.4

      - name: Link Supabase project
        run: supabase link --project-ref yfkqwpgjahoamlgckjib
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply Supabase migrations
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  build-and-deploy:
    name: Build & Deploy Website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify required build secrets
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_STRIPE_PRO_MONTHLY_LINK: ${{ secrets.PUBLIC_STRIPE_PRO_MONTHLY_LINK }}
          PUBLIC_STRIPE_PRO_YEARLY_LINK: ${{ secrets.PUBLIC_STRIPE_PRO_YEARLY_LINK }}
          PUBLIC_STRIPE_ENTERPRISE_MONTHLY_LINK: ${{ secrets.PUBLIC_STRIPE_ENTERPRISE_MONTHLY_LINK }}
          PUBLIC_STRIPE_ENTERPRISE_YEARLY_LINK: ${{ secrets.PUBLIC_STRIPE_ENTERPRISE_YEARLY_LINK }}
        run: |
          # Fail the job here rather than deploying a site that silently
          # disables auth or ships a pricing page with dead Subscribe buttons.
          # Astro bakes these at build time — a missing or rotated secret
          # would otherwise produce a broken production bundle.
          : "${PUBLIC_SUPABASE_URL:?Missing PUBLIC_SUPABASE_URL GitHub secret}"
          : "${PUBLIC_SUPABASE_ANON_KEY:?Missing PUBLIC_SUPABASE_ANON_KEY GitHub secret}"
          # Stripe Payment Links are business-critical for /pricing/: without
          # them the Subscribe buttons become dead-end alerts. Fail fast in
          # the production deploy workflow rather than shipping a broken
          # conversion funnel. Preview/PR builds aren't guarded by this job
          # (it only runs on push to master), so contributors aren't blocked.
          : "${PUBLIC_STRIPE_PRO_MONTHLY_LINK:?Missing PUBLIC_STRIPE_PRO_MONTHLY_LINK GitHub secret}"
          : "${PUBLIC_STRIPE_PRO_YEARLY_LINK:?Missing PUBLIC_STRIPE_PRO_YEARLY_LINK GitHub secret}"
          : "${PUBLIC_STRIPE_ENTERPRISE_MONTHLY_LINK:?Missing PUBLIC_STRIPE_ENTERPRISE_MONTHLY_LINK GitHub secret}"
          : "${PUBLIC_STRIPE_ENTERPRISE_YEARLY_LINK:?Missing PUBLIC_STRIPE_ENTERPRISE_YEARLY_LINK GitHub secret}"

      - name: Build website
        run: npx astro build
        env:
          VERCEL: '1'
          # Astro bakes import.meta.env.PUBLIC_* values at build time. Without these
          # the client-side Supabase client throws "Missing Supabase environment
          # variables" at page load, which in turn means every script that imports
          # src/lib/supabase.ts crashes — sign-in buttons silently become no-ops.
          # Keep these in lockstep with the Vercel project env vars.
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          # Stripe Payment Link URLs for /pricing/ Subscribe buttons.
          # Missing / empty values are rejected earlier by the "Verify required
          # build secrets" step above, which fails the job before the build
          # runs. That keeps a production deploy from ever shipping a pricing
          # page with dead-end Subscribe buttons — set the four secrets in
          # GitHub repo settings before running this workflow.
          PUBLIC_STRIPE_PRO_MONTHLY_LINK: ${{ secrets.PUBLIC_STRIPE_PRO_MONTHLY_LINK }}
          PUBLIC_STRIPE_PRO_YEARLY_LINK: ${{ secrets.PUBLIC_STRIPE_PRO_YEARLY_LINK }}
          PUBLIC_STRIPE_ENTERPRISE_MONTHLY_LINK: ${{ secrets.PUBLIC_STRIPE_ENTERPRISE_MONTHLY_LINK }}
          PUBLIC_STRIPE_ENTERPRISE_YEARLY_LINK: ${{ secrets.PUBLIC_STRIPE_ENTERPRISE_YEARLY_LINK }}

      - name: Verify build output
        run: |
          if [ ! -f dist/index.html ]; then
            echo "::error::Build output missing dist/index.html"
            exit 1
          fi
          PAGE_COUNT=$(find dist -name '*.html' | wc -l)
          echo "Built $PAGE_COUNT pages"
          if [ "$PAGE_COUNT" -lt 10 ]; then
            echo "::error::Suspiciously low page count ($PAGE_COUNT). Expected at least 10."
            exit 1
          fi

      - name: Install Vercel CLI
        run: npm i -g vercel@50.37.3

      - name: Prepare and deploy to Vercel Production
        working-directory: /tmp
        run: |
          mkdir -p vercel-deploy/website/dist
          cp -r $GITHUB_WORKSPACE/website/dist/* vercel-deploy/website/dist/
          cat > vercel-deploy/website/package.json << 'PKGJSON'
          {"scripts":{"build":"echo already built"}}
          PKGJSON
          cd vercel-deploy
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deployment summary
        if: success()
        run: |
          echo "## Marketing Website Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployed to Vercel Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Links" >> $GITHUB_STEP_SUMMARY
          echo "- [Home](https://aidotnet.dev/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Features](https://aidotnet.dev/features/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Pricing](https://aidotnet.dev/pricing/)" >> $GITHUB_STEP_SUMMARY
