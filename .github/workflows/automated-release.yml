name: Automated Release Pipeline

on:
  push:
    branches:
      - main
      - master
    # NOTE: do NOT add **.md / docs/** to paths-ignore here. Audit
    # finding #18 makes `docs:` commits map to PATCH bumps in this
    # workflow's analyze-and-bump step (line ~133 below); filtering
    # docs-only pushes at the trigger level would make that rule
    # unreachable and silently re-create the policy/workflow drift
    # we just fixed. Only filter paths that the workflow itself
    # legitimately doesn't need to react to (issue templates,
    # repo-hygiene files that don't drive a release).
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - '.gitignore'
      - '.editorconfig'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true  # Cancel stale release when new push to master arrives

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  version-and-build:
    name: Version and Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      package_version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.version.outputs.changelog }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - name: Free up disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          echo "=== Removing unnecessary tools to free disk space ==="
          # Remove Android SDK (~12GB)
          sudo rm -rf /usr/local/lib/android || true
          # Remove .NET pre-installed versions we don't need (~2GB)
          sudo rm -rf /usr/share/dotnet/shared/Microsoft.AspNetCore.App/6.* || true
          sudo rm -rf /usr/share/dotnet/shared/Microsoft.AspNetCore.App/7.* || true
          sudo rm -rf /usr/share/dotnet/shared/Microsoft.NETCore.App/6.* || true
          sudo rm -rf /usr/share/dotnet/shared/Microsoft.NETCore.App/7.* || true
          # Remove CodeQL (~1GB)
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          # Remove Swift (~1.5GB)
          sudo rm -rf /usr/share/swift || true
          # Remove Haskell (~5GB)
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/.ghcup || true
          # Clean apt cache
          sudo apt-get clean || true
          # Clean docker images (~3GB)
          docker system prune -af || true
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Determine version from conventional commits
        id: version
        run: |
          #!/bin/bash
          set -e

          echo "=== Automated Semantic Versioning from Conventional Commits ==="

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          CURRENT_VERSION=${LATEST_TAG#v}
          echo "Current version: $CURRENT_VERSION"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          PATCH=${PATCH%%-*}

          echo "Parsed version: $MAJOR.$MINOR.$PATCH"

          if git rev-parse "$LATEST_TAG" >/dev/null 2>&1; then
            COMMITS=$(git log "$LATEST_TAG..HEAD" --oneline --no-merges)
          else
            COMMITS=$(git log --oneline --no-merges)
          fi

          echo "=== Commits since last tag ==="
          echo "$COMMITS"
          echo "==========================="

          BUMP_TYPE="none"

          # Check for breaking changes (conventional format)
          if echo "$COMMITS" | grep -iE "(BREAKING CHANGE:|BREAKING:|^[a-f0-9]+ [a-z]+(\([^)]*\))?!:)" > /dev/null; then
            BUMP_TYPE="major"
            echo "Found BREAKING CHANGE - will bump MAJOR version"
          fi

          # Check for features (conventional format: feat:)
          if [ "$BUMP_TYPE" = "none" ] && echo "$COMMITS" | grep -iE "^[a-f0-9]+ feat(\(.*\))?:" > /dev/null; then
            BUMP_TYPE="minor"
            echo "Found feat: commits - will bump MINOR version"
          fi

          # PATCH bumps: fix, perf, refactor, docs, chore, style, test, ci, build, revert
          # Per Conventional Commits + semver.org: these are non-feature, non-breaking
          # changes that must not bump MINOR. Implements audit-2026-05 finding #18
          # (replaces the prior "Currently not implemented per project requirements"
          # behaviour in .github/VERSIONING.md, which was a semver contract violation).
          if [ "$BUMP_TYPE" = "none" ] && echo "$COMMITS" | grep -iE "^[a-f0-9]+ (fix|perf|refactor|docs|chore|style|test|ci|build|revert)(\(.*\))?:" > /dev/null; then
            BUMP_TYPE="patch"
            echo "Found fix/perf/refactor/docs/chore/style/test/ci/build/revert: commits - will bump PATCH version"
          fi

          # FALLBACK: non-conventional capitalised prefixes (no colon).
          # Conservative: map "Add/Implement/Create/New" (additive) to MINOR;
          # map "Fix/Update/Improve/Enhance/Resolve/Patch/Correct/Repair" to PATCH.
          # Pre-audit behaviour mapped both to MINOR — the latter is a semver
          # violation because a patch-class change should never bump MINOR.
          if [ "$BUMP_TYPE" = "none" ] && echo "$COMMITS" | grep -iE "^[a-f0-9]+ (add|implement|create|new) " > /dev/null; then
            BUMP_TYPE="minor"
            echo "Found Add/Implement/Create commits - will bump MINOR version"
          fi

          if [ "$BUMP_TYPE" = "none" ] && echo "$COMMITS" | grep -iE "^[a-f0-9]+ (fix|update|improve|enhance|resolve|patch|correct|repair) " > /dev/null; then
            BUMP_TYPE="patch"
            echo "Found Fix/Update/Improve commits - will bump PATCH version"
          fi

          case $BUMP_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              echo "Bumping MAJOR: $CURRENT_VERSION -> $MAJOR.$MINOR.$PATCH"
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              echo "Bumping MINOR: $CURRENT_VERSION -> $MAJOR.$MINOR.$PATCH"
              ;;
            patch)
              PATCH=$((PATCH + 1))
              echo "Bumping PATCH: $CURRENT_VERSION -> $MAJOR.$MINOR.$PATCH"
              ;;
            none)
              echo "No conventional commits found, no version bump"
              echo "should_release=false" >> $GITHUB_OUTPUT
              echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
              echo "changelog=No release needed - no conventional commits found" >> $GITHUB_OUTPUT
              exit 0
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"

          echo "=== Generating Changelog ==="
          CHANGELOG="## Changes in v$NEW_VERSION"$'\n\n'

          BREAKING=$(echo "$COMMITS" | grep -iE "BREAKING CHANGE:|BREAKING:" || true)
          if [ -n "$BREAKING" ]; then
            CHANGELOG+="### Breaking Changes"$'\n'
            while IFS= read -r line; do
              CHANGELOG+="- ${line#* }"$'\n'
            done < <(echo "$BREAKING")
            CHANGELOG+=$'\n'
          fi

          FEATURES=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ feat(\(.*\))?:" || true)
          if [ -n "$FEATURES" ]; then
            CHANGELOG+="### Features"$'\n'
            while IFS= read -r line; do
              MSG=$(echo "$line" | sed -E 's/^[a-f0-9]+ feat(\(.*\))?: //')
              CHANGELOG+="- $MSG"$'\n'
            done < <(echo "$FEATURES")
            CHANGELOG+=$'\n'
          fi

          FIXES=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ fix(\(.*\))?:" || true)
          if [ -n "$FIXES" ]; then
            CHANGELOG+="### Bug Fixes"$'\n'
            while IFS= read -r line; do
              MSG=$(echo "$line" | sed -E 's/^[a-f0-9]+ fix(\(.*\))?: //')
              CHANGELOG+="- $MSG"$'\n'
            done < <(echo "$FIXES")
            CHANGELOG+=$'\n'
          fi

          PERF=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ perf(\(.*\))?:" || true)
          if [ -n "$PERF" ]; then
            CHANGELOG+="### Performance Improvements"$'\n'
            while IFS= read -r line; do
              MSG=$(echo "$line" | sed -E 's/^[a-f0-9]+ perf(\(.*\))?: //')
              CHANGELOG+="- $MSG"$'\n'
            done < <(echo "$PERF")
            CHANGELOG+=$'\n'
          fi

          REFACTOR=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ refactor(\(.*\))?:" || true)
          if [ -n "$REFACTOR" ]; then
            CHANGELOG+="### Code Refactoring"$'\n'
            while IFS= read -r line; do
              MSG=$(echo "$line" | sed -E 's/^[a-f0-9]+ refactor(\(.*\))?: //')
              CHANGELOG+="- $MSG"$'\n'
            done < <(echo "$REFACTOR")
            CHANGELOG+=$'\n'
          fi

          DOCS=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ docs(\(.*\))?:" || true)
          if [ -n "$DOCS" ]; then
            CHANGELOG+="### Documentation"$'\n'
            while IFS= read -r line; do
              MSG=$(echo "$line" | sed -E 's/^[a-f0-9]+ docs(\(.*\))?: //')
              CHANGELOG+="- $MSG"$'\n'
            done < <(echo "$DOCS")
            CHANGELOG+=$'\n'
          fi

          # FALLBACK: Non-conventional commits - New features (Add/Implement/Create/New)
          NEW_FEATURES=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ (add|implement|create|new) " | grep -viE "^[a-f0-9]+ (feat|fix|refactor|perf|docs)(\(.*\))?:" || true)
          if [ -n "$NEW_FEATURES" ]; then
            CHANGELOG+="### New Features"$'\n'
            while IFS= read -r line; do
              MSG=$(echo "$line" | sed -E 's/^[a-f0-9]+ //')
              CHANGELOG+="- $MSG"$'\n'
            done < <(echo "$NEW_FEATURES")
            CHANGELOG+=$'\n'
          fi

          # FALLBACK: Non-conventional commits - Bug fixes and improvements
          OTHER_FIXES=$(echo "$COMMITS" | grep -iE "^[a-f0-9]+ (fix|update|improve|enhance|resolve|patch|correct|repair) " | grep -viE "^[a-f0-9]+ (feat|fix|refactor|perf|docs)(\(.*\))?:" || true)
          if [ -n "$OTHER_FIXES" ]; then
            CHANGELOG+="### Bug Fixes & Improvements"$'\n'
            while IFS= read -r line; do
              MSG=$(echo "$line" | sed -E 's/^[a-f0-9]+ //')
              CHANGELOG+="- $MSG"$'\n'
            done < <(echo "$OTHER_FIXES")
            CHANGELOG+=$'\n'
          fi

          echo "$CHANGELOG"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "should_release=true" >> $GITHUB_OUTPUT

          echo "$CHANGELOG" > /tmp/changelog.txt
          {
            echo 'changelog<<EOF'
            cat /tmp/changelog.txt
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Inject build signing key
        if: steps.version.outputs.should_release == 'true'
        run: |
          if [ -z "${{ secrets.AIDOTNET_BUILD_KEY }}" ]; then
            echo "::error::AIDOTNET_BUILD_KEY secret is not configured. Cannot publish unsigned artifacts."
            exit 1
          fi
          mkdir -p src/BuildKey
          echo "${{ secrets.AIDOTNET_BUILD_KEY }}" | xxd -r -p > src/BuildKey/BuildKey.bin
          echo "Build key injected ($(wc -c < src/BuildKey/BuildKey.bin) bytes)"

      - name: Generate integrity hash
        if: steps.version.outputs.should_release == 'true'
        run: |
          mkdir -p src/IntegrityHash
          BUILD_KEY_HEX=$(xxd -p -c 256 src/BuildKey/BuildKey.bin | tr -d '\n')
          # HMAC-SHA256(buildKey, buildKey) — matches AssemblyIntegrityChecker.VerifyIntegrity()
          openssl dgst -sha256 -mac HMAC -macopt "hexkey:${BUILD_KEY_HEX}" -binary < src/BuildKey/BuildKey.bin > src/IntegrityHash/IntegrityHash.bin
          echo "Integrity hash generated ($(wc -c < src/IntegrityHash/IntegrityHash.bin) bytes)"

      - name: Restore dependencies
        if: steps.version.outputs.should_release == 'true'
        run: dotnet restore

      - name: Build
        if: steps.version.outputs.should_release == 'true'
        run: dotnet build -c Release --no-restore

      # Smoke-test gate before pack/publish. Master-CI gating IS the
      # primary safety net (PRs cannot merge if tests fail), but a
      # release-time smoke test catches:
      #   - master-CI flakiness that landed a passing-by-retry commit
      #   - drift between CI test SDK and release-runner SDK
      #   - last-minute pre-publish commits (auto-commit version bumps,
      #     CHANGELOG generation) that altered behavior without
      #     re-triggering CI
      # The filter `Category=Smoke|FullyQualifiedName~SmokeTests` selects
      # a fast subset (~< 1 minute target). When no smoke-tagged tests
      # exist, the test discovery completes successfully with zero tests
      # run — the gate passes without blocking releases that haven't yet
      # adopted the Category=Smoke convention.
      - name: Smoke tests (release gate)
        if: steps.version.outputs.should_release == 'true'
        env:
          # ProgramSynthesisCoverageSmokeTests (CodeT5, GraphCodeBERT)
          # invoke GetModelMetadata which serializes the model via
          # ModelPersistenceGuard.EnforceBeforeSerialize. Without a
          # license key in the environment, the guard throws
          # LicenseRequiredException and the release-gate fails — the
          # symptom that blocked every release since the smoke gate was
          # added. The secret holds the project's CI license; pipe it
          # through here so LicenseKeyResolver.Resolve finds it.
          AIDOTNET_LICENSE_KEY: ${{ secrets.AIDOTNET_LICENSE_KEY }}
        run: |
          dotnet test tests/AiDotNet.Tests/AiDotNetTests.csproj \
            --no-build -c Release --framework net10.0 \
            --filter "Category=Smoke|FullyQualifiedName~SmokeTests" \
            --logger "console;verbosity=normal"

  # Pack NuGet after version-and-build completes
  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: version-and-build
    timeout-minutes: 20
    if: needs.version-and-build.outputs.should_release == 'true'
    steps:
      - name: Free up disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          echo "=== Removing unnecessary tools to free disk space ==="
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet/shared/Microsoft.AspNetCore.App/6.* || true
          sudo rm -rf /usr/share/dotnet/shared/Microsoft.AspNetCore.App/7.* || true
          sudo rm -rf /usr/share/dotnet/shared/Microsoft.NETCore.App/6.* || true
          sudo rm -rf /usr/share/dotnet/shared/Microsoft.NETCore.App/7.* || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo apt-get clean || true
          docker system prune -af || true
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Inject build signing key
        run: |
          if [ -z "${{ secrets.AIDOTNET_BUILD_KEY }}" ]; then
            echo "::error::AIDOTNET_BUILD_KEY secret is not configured. Cannot publish unsigned artifacts."
            exit 1
          fi
          mkdir -p src/BuildKey
          echo "${{ secrets.AIDOTNET_BUILD_KEY }}" | xxd -r -p > src/BuildKey/BuildKey.bin
          echo "Build key injected ($(wc -c < src/BuildKey/BuildKey.bin) bytes)"

      - name: Generate integrity hash
        run: |
          mkdir -p src/IntegrityHash
          BUILD_KEY_HEX=$(xxd -p -c 256 src/BuildKey/BuildKey.bin | tr -d '\n')
          # HMAC-SHA256(buildKey, buildKey) — matches AssemblyIntegrityChecker.VerifyIntegrity()
          openssl dgst -sha256 -mac HMAC -macopt "hexkey:${BUILD_KEY_HEX}" -binary < src/BuildKey/BuildKey.bin > src/IntegrityHash/IntegrityHash.bin
          echo "Integrity hash generated ($(wc -c < src/IntegrityHash/IntegrityHash.bin) bytes)"

      - name: Restore and Build
        run: |
          dotnet restore
          dotnet build -c Release --no-restore

      - name: Pack NuGet
        run: |
          if [ -f "src/AiDotNet.csproj" ]; then
            dotnet pack src/AiDotNet.csproj -c Release -o out --no-build /p:PackageVersion=${{ needs.version-and-build.outputs.package_version }}
            echo "Package created: AiDotNet.${{ needs.version-and-build.outputs.package_version }}.nupkg"
          else
            echo "Error: src/AiDotNet.csproj not found"
            exit 1
          fi

      - name: Verify TFMs in package (net471, net10.0)
        run: |
          set -e
          shopt -s nullglob
          pkgs=(out/*.nupkg)
          if [ ${#pkgs[@]} -eq 0 ]; then
            echo "Error: No packages found in out/"
            exit 1
          fi

          for pkg in "${pkgs[@]}"; do
            echo "Inspecting $pkg"
            files=$(unzip -Z1 "$pkg")

            for tfm in net471 net10.0; do
              if ! echo "$files" | grep -qE "^lib/${tfm}/.+\\.dll$"; then
                echo "Error: Missing ${tfm} lib in package"
                exit 1
              else
                echo "Found ${tfm} in package"
              fi
            done
          done

          echo "All required TFMs verified successfully"

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: nuget-package-${{ github.sha }}
          path: out/*.nupkg
          if-no-files-found: error

  publish-nuget:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: [version-and-build, pack]
    timeout-minutes: 10
    if: needs.version-and-build.outputs.should_release == 'true'
    steps:
      - name: Download package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v6
        with:
          name: nuget-package-${{ github.sha }}
          path: out/

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x

      - name: Push to NuGet
        run: |
          shopt -s nullglob
          pkgs=(out/*.nupkg)

          if [ ${#pkgs[@]} -eq 0 ]; then
            echo "Error: No .nupkg files found in out/ directory"
            exit 1
          fi

          for pkg in "${pkgs[@]}"; do
            echo "Publishing $pkg to NuGet..."
            dotnet nuget push "$pkg" \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate

            if [ $? -eq 0 ]; then
              echo "Successfully published $pkg"
            else
              echo "Warning: Failed to publish $pkg (may already exist)"
            fi
          done

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version-and-build, publish-nuget]
    timeout-minutes: 10
    if: needs.version-and-build.outputs.should_release == 'true'
    steps:
      - name: Download package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v6
        with:
          name: nuget-package-${{ github.sha }}
          path: out/

      - name: List artifacts
        run: ls -lah out/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2
        with:
          tag_name: v${{ needs.version-and-build.outputs.package_version }}
          name: Release v${{ needs.version-and-build.outputs.package_version }}
          body: ${{ needs.version-and-build.outputs.changelog }}
          files: out/*.nupkg
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
